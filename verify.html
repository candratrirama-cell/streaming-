<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rtysafe - Gate</title>
    <style>
        :root {
            --bg: #000;
            --accent: #00ff41;
            --text: #fff;
            --error: #ff4141;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            border: 3px solid var(--accent);
            padding: 2rem;
            box-shadow: 8px 8px 0px var(--accent);
            text-align: center;
            max-width: 400px;
            background: #111;
            width: 90%;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 2px; }
        .status { margin-bottom: 20px; color: var(--accent); font-weight: bold; min-height: 24px; }
        .loader {
            height: 6px;
            width: 100%;
            background: #222;
            position: relative;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .progress {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s linear;
        }
        #captcha-box { display: none; margin-top: 15px; border-top: 1px dashed var(--accent); padding-top: 15px; }
        .captcha-warn { color: var(--error); font-size: 0.8rem; margin-bottom: 10px; }
        input {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 10px;
            width: 100px;
            text-align: center;
            outline: none;
            font-size: 1.2rem;
        }
        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 25px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h1>Rtysafe Verifier</h1>
    <div id="status" class="status">Initializing Security Check...</div>
    <div class="loader"><div id="progress" class="progress"></div></div>
    
    <div id="captcha-box">
        <div class="captcha-warn">TRAFFIC HIGH: Please verify you are human.</div>
        <p id="captcha-text" style="font-weight: bold; font-size: 1.3rem; margin: 10px 0;"></p>
        <input type="number" id="captcha-input" placeholder="?">
        <br>
        <button onclick="verifyCaptcha()">Submit Access</button>
    </div>
</div>

<script>
    const statusText = document.getElementById('status');
    const progressBar = document.getElementById('progress');
    const captchaBox = document.getElementById('captcha-box');
    let progress = 0;
    let needsCaptcha = false;

    // Fungsi cek kuota verifikasi (7 kali per menit)
    function checkRateLimit() {
        const now = Date.now();
        const oneMinute = 60 * 1000;
        let history = JSON.parse(localStorage.getItem('rtysafe_logs') || "[]");
        
        // Buang log yang sudah lebih dari 1 menit
        history = history.filter(ts => (now - ts) < oneMinute);
        localStorage.setItem('rtysafe_logs', JSON.stringify(history));

        return history.length >= 7;
    }

    function generateToken() {
        return Math.random().toString(36).substring(2, 15) + btoa(Date.now().toString()).substring(0, 5);
    }

    function startVerification() {
        needsCaptcha = checkRateLimit();
        
        const duration = 7000; // 7 Detik
        const intervalTime = 100;
        const increment = (intervalTime / duration) * 100;

        const timer = setInterval(() => {
            progress += increment;
            progressBar.style.width = Math.min(progress, 100) + "%";

            if (progress >= 100) {
                clearInterval(timer);
                if (needsCaptcha) {
                    showCaptcha();
                } else {
                    grantAccess();
                }
            }
        }, intervalTime);
    }

    function showCaptcha() {
        statusText.innerText = "CAPTCHA REQUIRED";
        statusText.style.color = "#ff4141";
        captchaBox.style.display = "block";
        
        window.ans1 = Math.floor(Math.random() * 15) + 1;
        window.ans2 = Math.floor(Math.random() * 15) + 1;
        document.getElementById('captcha-text').innerText = `${window.ans1} + ${window.ans2} = ?`;
    }

    function verifyCaptcha() {
        const userAns = parseInt(document.getElementById('captcha-input').value);
        if (userAns === (window.ans1 + window.ans2)) {
            grantAccess();
        } else {
            alert("Verification Failed. Try Again.");
            showCaptcha();
        }
    }

    function grantAccess() {
        // Catat keberhasilan ke log rate limit
        let history = JSON.parse(localStorage.getItem('rtysafe_logs') || "[]");
        history.push(Date.now());
        localStorage.setItem('rtysafe_logs', JSON.stringify(history));

        const token = generateToken();
        sessionStorage.setItem('rtysafe_session_token', token);
        
        statusText.innerText = "ACCESS GRANTED";
        statusText.style.color = "#00ff41";
        
        setTimeout(() => {
            window.location.href = `index.html?token=${token}`;
        }, 800);
    }

    window.onload = startVerification;
</script>
</body>
</html>
