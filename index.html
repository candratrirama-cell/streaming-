    <!-- Script Verifikasi Akses -->
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const urlToken = urlParams.get('token');
            const sessionToken = sessionStorage.getItem('rtysafe_session_token');

            // 1. Cek apakah ada token di URL yang cocok dengan session (Baru selesai verif)
            if (urlToken && urlToken === sessionToken) {
                // Berhasil: Bersihkan URL agar token tidak bisa disalin/share
                const cleanUrl = window.location.origin + window.location.pathname;
                window.history.replaceState({}, document.title, cleanUrl);
            } 
            // 2. Cek apakah sesi sudah aktif (Refresh halaman/F5)
            else if (sessionToken) {
                // Biarkan pengguna tetap di halaman
            } 
            // 3. Jika tidak ada sesi & tidak ada token (Akses ilegal / Tab baru)
            else {
                window.location.replace('verify.html');
            }
        })();
    </script>
    
    <style>
        :root {
            --bg: #000000;
            --card: rgba(255, 255, 255, 0.08); 
            --accent: #ffffff;
            --text: #ffffff;
            --text-dim: #a1a1a6;
            --glass-border: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.2) 100%);
            --ios-blur: blur(30px) saturate(210%);
            --ios-bezier: cubic-bezier(0.25, 1, 0.5, 1);
            --heart: #ff3b30;
        }

        [data-theme="light"] {
            --bg: #f2f2f7;
            --card: rgba(0, 0, 0, 0.05);
            --accent: #000000;
            --text: #000000;
            --text-dim: #636366;
            --glass-border: linear-gradient(135deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.02) 50%, rgba(0,0,0,0.1) 100%);
        }

        /* Sembunyikan konten secara default */
        body { 
            display: none; 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; 
        }
        
        /* Hanya tampilkan jika sudah terverifikasi */
        body.verified { 
            display: block !important; 
            background: var(--bg); 
            color: var(--text); 
            transition: background 0.5s var(--ios-bezier); 
            min-height: 100vh; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; 
        }

        .view { display: none; padding-bottom: 120px; }
        .view.active { display: block; animation: viewEnter 0.5s var(--ios-bezier); }
        @keyframes viewEnter { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 0 16px; }

        header { padding: 15px 0 10px; }
        .brand-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .brand-row h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; }

        .search-bar { 
            background: var(--card); border-radius: 18px; 
            position: relative; display: flex; align-items: center; padding: 0 14px;
            backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
        }
        .search-bar::before {
            content: ""; position: absolute; inset: 0; padding: 1px;
            background: var(--glass-border);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; border-radius: 18px; pointer-events: none;
        }
        .search-bar input { flex: 1; border: none; background: transparent; padding: 14px 10px; color: var(--text); font-size: 16px; outline: none; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 15px; }
        .card { cursor: pointer; transition: 0.3s var(--ios-bezier); width: 100%; }
        .card-img { 
            width: 100%; aspect-ratio: 0.68; 
            border-radius: 20px; overflow: hidden; 
            background: #111; position: relative;
            margin-bottom: 8px;
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }

        .dock-wrap { position: fixed; bottom: 25px; left: 0; right: 0; display: flex; justify-content: center; z-index: 8000; pointer-events: none; transition: transform 0.4s var(--ios-bezier); }
        .dock { 
            background: rgba(20, 20, 20, 0.7); 
            backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            padding: 6px; border-radius: 32px; display: flex; gap: 8px; 
            position: relative; pointer-events: auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .dock-item { width: 50px; height: 50px; border-radius: 25px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); transition: 0.4s var(--ios-bezier); cursor: pointer; }
        .dock-item.active { background: var(--accent); color: var(--bg); width: 120px; }
        .dock-item span { font-size: 14px; font-weight: 700; margin-left: 8px; display: none; }
        .dock-item.active span { display: block; }

        .panel { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); 
            z-index: 9000; transform: translateY(100%); transition: 0.5s var(--ios-bezier); 
            overflow-y: auto; padding-bottom: 180px; 
        }
        .panel.active { transform: translateY(0); }
        
        .panel-nav { 
            position: sticky; top: 0; padding: 12px 16px; 
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, var(--bg) 80%, transparent);
            z-index: 9999; 
        }

        .gallery { 
            display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; 
            padding: 10px 20px; margin-bottom: 10px; scroll-snap-type: x mandatory; 
        }
        .gallery-item { 
            min-width: 85%; height: 420px; 
            display: flex; justify-content: center; align-items: center;
            scroll-snap-align: center; background: transparent; 
            border-radius: 24px; overflow: hidden;
        }
        .gallery-item img { 
            height: 100%; width: auto; 
            max-width: 100%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-round { width: 44px; height: 44px; border-radius: 22px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: var(--text); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .btn-round::after { content: ""; position: absolute; inset: 0; padding: 1px; background: var(--glass-border); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; border-radius: 22px; pointer-events: none; }

        .apply-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            padding: 12px 20px calc(12px + env(safe-area-inset-bottom, 10px)); 
            background: rgba(10, 10, 10, 0.9); backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            display: flex; flex-direction: column; gap: 8px;
            z-index: 10000; transform: translateY(100%); transition: 0.5s var(--ios-bezier);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .panel.active ~ .apply-bar { transform: translateY(0); }
        
        .btn-tutorial { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: var(--text); padding: 12px; border-radius: 16px; 
            font-size: 13px; font-weight: 700; cursor:pointer; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .btn-apply { 
            width: 100%; height: 50px; border-radius: 25px; 
            background: var(--accent); color: var(--bg); border: none; 
            font-weight: 800; font-size: 15px; display: flex; 
            align-items: center; justify-content: center; gap: 10px; 
            cursor: pointer; transition: 0.2s; 
        }
        .btn-apply:active { transform: scale(0.96); }

        .stat-pill { background: var(--card); padding: 6px 12px; border-radius: 10px; display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 12px; position: relative; }
        .stat-pill::after { content: ""; position: absolute; inset: 0; padding: 1px; background: var(--glass-border); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; border-radius: 10px; pointer-events: none; }

        #toast { position: fixed; top: 50px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 10px 20px; border-radius: 30px; font-size: 14px; font-weight: 800; z-index: 21000; opacity: 0; transition: 0.4s; pointer-events: none; }
        #toast.active { opacity: 1; top: 60px; }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body id="mainBody">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://miningtransaction-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let allData = [];
        let favorites = JSON.parse(localStorage.getItem('themeX_favs') || '[]');
        let likedItems = JSON.parse(localStorage.getItem('themeX_liked') || '[]');
        let currentItem = null;

        onValue(ref(db, 'apps/'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                allData = Object.keys(data).filter(key => !data[key].is_apk).map(key => ({ 
                    id: key, ...data[key], likes: data[key].likes || 0
                }));
                refreshView();
            }
        });

        function refreshView() {
            const activeView = document.querySelector('.view.active').id;
            if(activeView === 'view-home') renderItems(allData, 'mainGrid');
            if(activeView === 'view-browse') renderItems([...allData].reverse(), 'browseGrid');
            if(activeView === 'view-fav') renderItems(allData.filter(i => favorites.includes(i.id)), 'favGrid');
        }

        function renderItems(items, gridId) {
            const grid = document.getElementById(gridId);
            if (!grid) return;
            grid.innerHTML = items.length ? '' : '<p style="grid-column: 1/-1; text-align:center; padding: 60px; opacity: 0.3;">Belum ada tema.</p>';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => openDetail(item);
                div.innerHTML = `
                    <div class="card-img"><img src="${item.images ? item.images[0] : ''}" loading="lazy"></div>
                    <div style="padding: 0 4px;">
                        <p style="font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.name}</p>
                        <p style="font-size: 11px; color: var(--text-dim); font-weight: 600;">${item.dev || 'Verified'}</p>
                    </div>
                `;
                grid.appendChild(div);
            });
            lucide.createIcons();
        }

        // Verifikasi sesi untuk menampilkan konten
        if (sessionStorage.getItem('rtysafe_session_token')) {
            document.getElementById('mainBody').classList.add('verified');
        }

        window.switchView = (viewName, el) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            el.classList.add('active');
            refreshView();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.openDetail = (item) => {
            currentItem = item;
            document.getElementById('detTitle').innerText = item.name;
            document.getElementById('detAuthor').querySelector('span').innerText = item.dev || 'themeX Creator';
            document.getElementById('detLikeCount').innerText = item.likes;
            document.getElementById('detSize').innerText = item.size || '3.5 MB';
            document.getElementById('detDesc').innerText = item.desc || "Berikan tampilan baru pada smartphone Anda dengan desain premium ini.";
            
            const gallery = document.getElementById('detGallery');
            gallery.innerHTML = '';
            (item.images || []).forEach(img => {
                gallery.innerHTML += `<div class="gallery-item"><img src="${img}"></div>`;
            });

            document.getElementById('detLikeBtn').style.color = likedItems.includes(item.id) ? 'var(--heart)' : 'var(--text)';
            document.getElementById('detLikeBtn').onclick = () => handleLike(item.id);

            document.getElementById('installBtn').onclick = () => {
                showToast("Membuka tautan unduhan...");
                setTimeout(() => window.open(item.link, '_blank'), 600);
            };

            document.getElementById('detailPanel').classList.add('active');
            document.getElementById('mainDock').style.transform = 'translateY(150%)';
        };

        window.closeDetail = () => {
            document.getElementById('detailPanel').classList.remove('active');
            document.getElementById('mainDock').style.transform = 'translateY(0)';
        };

        window.copyShareLink = () => {
            if(!currentItem) return;
            const dummy = document.createElement('input');
            document.body.appendChild(dummy);
            dummy.value = currentItem.link;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);
            showToast("Link disalin!");
        };

        function handleLike(id) {
            if (likedItems.includes(id)) return;
            runTransaction(ref(db, `apps/${id}/likes`), (c) => (c || 0) + 1).then(() => {
                likedItems.push(id);
                if(!favorites.includes(id)) favorites.push(id);
                localStorage.setItem('themeX_liked', JSON.stringify(likedItems));
                localStorage.setItem('themeX_favs', JSON.stringify(favorites));
                document.getElementById('detLikeBtn').style.color = 'var(--heart)';
                showToast("Berhasil disukai!");
                refreshView();
            });
        }

        window.toggleTheme = () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            lucide.createIcons();
        };

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 2000);
        };

        window.doSearch = () => {
            const term = document.getElementById('searchInput').value.toLowerCase();
            renderItems(allData.filter(i => i.name.toLowerCase().includes(term)), 'mainGrid');
        };

        lucide.createIcons();
    </script>

    <script>
        (async function() {
            const BIN_ID = "69aba10b43b1c97be9bc6862";
            const MASTER_KEY = "$2a$10$go25lr52o.r3GKWOrNSUiO6Gdv52kcAcNS56vMiiIhlM5yX3X2ON6";
            const currentURL = window.location.href; 

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { "X-Master-Key": MASTER_KEY }
                });
                const result = await response.json();
                const adsList = result.record;

                if (Array.isArray(adsList)) {
                    const activeAd = adsList.find(ad => 
                        ad.tampilkan === true && 
                        (currentURL.includes(ad.link_target) || ad.link_target === "*")
                    );

                    if (activeAd) {
                        const overlay = document.getElementById('ads-go-overlay');
                        const box = document.getElementById('ads-go-box');
                        const img = document.getElementById('ads-go-img');

                        img.src = activeAd.poster;
                        img.addEventListener('click', function() {
                            window.open(activeAd.link_promosi, '_blank');
                        });

                        overlay.style.display = 'flex';
                        setTimeout(() => {
                            overlay.style.opacity = '1';
                            box.style.transform = 'scale(1)';
                        }, 200);
                    }
                }
            } catch (error) {
                console.error("Ads Go v3: Terjadi kendala koneksi database.");
            }
        })();

        function tutupIklanAdsGo() {
            const overlay = document.getElementById('ads-go-overlay');
            overlay.style.opacity = '0';
            document.getElementById('ads-go-box').style.transform = 'scale(0.8)';
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 400);
        }
    </script>
