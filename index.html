<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLOY | ADMIN PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;900&display=swap');
        body { background-color: #1a1a2e; font-family: 'Public Sans', sans-serif; }
        .neo-box { background: #fff; border: 4px solid #000; box-shadow: 8px 8px 0px #000; }
        .neo-btn { background: #facc15; border: 4px solid #000; box-shadow: 4px 4px 0px #000; font-weight: 900; }
        .neo-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }
        .neo-input { width: 100%; padding: 15px; border: 4px solid #000; font-weight: 900; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-10 text-black">

    <section id="login-page" class="min-h-screen flex items-center justify-center">
        <div class="neo-box p-10 max-w-sm w-full text-center">
            <h2 class="text-2xl font-black mb-8 uppercase">Admin Access</h2>
            <input type="text" id="u-in" placeholder="USERNAME" class="neo-input mb-4">
            <input type="password" id="p-in" placeholder="PASSWORD" class="neo-input mb-8">
            <button onclick="handleLogin()" class="neo-btn w-full py-4 text-xl">LOGIN →</button>
        </div>
    </section>

    <section id="admin-page" class="hidden max-w-4xl mx-auto">
        <h1 class="text-4xl font-black text-white italic mb-10">HELLO, BOSS!</h1>
        
        <div class="neo-box p-8 bg-white mb-10">
            <h3 class="font-black text-xl mb-6 italic underline">NEW DEPLOYMENT</h3>
            <input type="text" id="web-slug" placeholder="project-name" class="neo-input mb-4">
            <textarea id="web-html" placeholder="Your HTML code..." class="neo-input h-48 mb-6"></textarea>
            <button onclick="handlePublish()" class="neo-btn bg-cyan-400 w-full py-4 uppercase">Launch Project ✨</button>
        </div>

        <div class="neo-box p-8 bg-white">
            <h3 class="font-black text-xl mb-6 italic underline">MY PROJECTS</h3>
            <div id="master-list" class="space-y-4 text-sm">Loading...</div>
        </div>
    </section>

<script>
    const api = 'api.php';

    async function handleLogin() {
        const fd = new FormData();
        fd.append('u', document.getElementById('u-in').value);
        fd.append('p', document.getElementById('p-in').value);

        const res = await fetch(`${api}?action=login`, { method: 'POST', body: fd });
        if(res.ok) {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('admin-page').classList.remove('hidden');
            loadList();
        } else { alert("SALAH, BOSS!"); }
    }

    async function handlePublish() {
        const fd = new FormData();
        fd.append('slug', document.getElementById('web-slug').value);
        fd.append('content', document.getElementById('web-html').value);

        const res = await fetch(`${api}?action=publish`, { method: 'POST', body: fd });
        if(res.ok) {
            alert("BERHASIL!");
            location.reload();
        }
    }

    async function loadList() {
        const res = await fetch(`${api}?action=list`);
        const data = await res.json();
        const container = document.getElementById('master-list');
        container.innerHTML = "";
        
        for(let key in data) {
            container.innerHTML += `
                <div class="border-4 border-black p-4 flex justify-between bg-gray-50 shadow-[4px_4px_0px_#000]">
                    <span class="font-black italic">/${key}</span>
                    <span class="font-bold text-blue-600">${data[key].views || 0} Views</span>
                </div>`;
        }
    }
</script>
</body>
</html>
