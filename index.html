<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>themeX Store - Premium</title>

    <link rel="icon" href="https://i.ibb.co/nhzx0CS/20260105-114157.png" type="image/png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000000; --card: rgba(255, 255, 255, 0.08); --accent: #ffffff;
            --text: #ffffff; --text-dim: #a1a1a6; --heart: #ff3b30;
            --glass-border: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.2) 100%);
            --ios-blur: blur(30px) saturate(210%); --ios-bezier: cubic-bezier(0.25, 1, 0.5, 1);
        }
        [data-theme="light"] { --bg: #f2f2f7; --card: rgba(0, 0, 0, 0.05); --accent: #000000; --text: #000000; --text-dim: #636366; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.5s var(--ios-bezier); min-height: 100vh; overflow-x: hidden; }
        
        .view { display: none; padding-bottom: 120px; }
        .view.active { display: block; animation: viewEnter 0.5s var(--ios-bezier); }
        @keyframes viewEnter { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 0 16px; }
        header { padding: 15px 0 10px; }
        .brand-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .brand-row h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; }

        .search-bar { background: var(--card); border-radius: 18px; position: relative; display: flex; align-items: center; padding: 0 14px; backdrop-filter: var(--ios-blur); }
        .search-bar input { flex: 1; border: none; background: transparent; padding: 14px 10px; color: var(--text); font-size: 16px; outline: none; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 15px; }
        .card { cursor: pointer; transition: 0.3s var(--ios-bezier); width: 100%; }
        .card-img { width: 100%; aspect-ratio: 0.68; border-radius: 20px; overflow: hidden; background: #111; position: relative; margin-bottom: 8px; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }

        .dock-wrap { position: fixed; bottom: 25px; left: 0; right: 0; display: flex; justify-content: center; z-index: 8000; transition: 0.4s var(--ios-bezier); }
        .dock { background: rgba(20, 20, 20, 0.7); backdrop-filter: var(--ios-blur); padding: 6px; border-radius: 32px; display: flex; gap: 8px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .dock-item { width: 50px; height: 50px; border-radius: 25px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); transition: 0.4s var(--ios-bezier); cursor: pointer; }
        .dock-item.active { background: var(--accent); color: var(--bg); width: 120px; }
        .dock-item span { font-size: 14px; font-weight: 700; margin-left: 8px; display: none; }
        .dock-item.active span { display: block; }

        .panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9000; transform: translateY(100%); transition: 0.5s var(--ios-bezier); overflow-y: auto; padding-bottom: 180px; }
        .panel.active { transform: translateY(0); }
        .panel-nav { position: sticky; top: 0; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; background: var(--bg); z-index: 9999; }

        .gallery { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; padding: 10px 20px; scroll-snap-type: x mandatory; }
        .gallery-item { min-width: 85%; height: 420px; scroll-snap-align: center; border-radius: 24px; overflow: hidden; background: #111; }
        .gallery-item img { height: 100%; width: 100%; object-fit: contain; }

        .btn-round { width: 44px; height: 44px; border-radius: 22px; background: rgba(255,255,255,0.1); color: var(--text); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .apply-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 20px calc(12px + env(safe-area-inset-bottom, 10px)); background: rgba(10, 10, 10, 0.9); backdrop-filter: var(--ios-blur); display: flex; flex-direction: column; gap: 8px; z-index: 10000; transform: translateY(100%); transition: 0.5s var(--ios-bezier); border-top: 1px solid rgba(255,255,255,0.1); }
        .panel.active ~ .apply-bar { transform: translateY(0); }
        .btn-apply { width: 100%; height: 50px; border-radius: 25px; background: var(--accent); color: var(--bg); border: none; font-weight: 800; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }

        .stat-pill { background: var(--card); padding: 6px 12px; border-radius: 10px; display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 12px; }
        #toast { position: fixed; top: 50px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 10px 20px; border-radius: 30px; font-size: 14px; font-weight: 800; z-index: 21000; opacity: 0; transition: 0.4s; pointer-events: none; }
        #toast.active { opacity: 1; top: 60px; }
    </style>
</head>
<body data-theme="dark">

    <div id="toast">Notifikasi</div>

    <div id="view-home" class="view active">
        <div class="container">
            <header>
                <div class="brand-row">
                    <h1>theme<span>X</span></h1>
                    <button class="btn-round" onclick="toggleTheme()"><i data-lucide="moon"></i></button>
                </div>
                <div class="search-bar">
                    <i data-lucide="search" style="color: var(--text-dim)"></i>
                    <input type="text" id="searchInput" placeholder="Cari tema..." oninput="doSearch()">
                </div>
            </header>
            <div class="grid" id="mainGrid"></div>
        </div>
    </div>

    <div id="view-browse" class="view"><div class="container"><header><h1>Jelajahi</h1></header><div class="grid" id="browseGrid"></div></div></div>
    <div id="view-fav" class="view"><div class="container"><header><h1>Favorit</h1></header><div id="favGrid" class="grid"></div></div></div>
    <div id="view-settings" class="view">
        <div class="container"><header><h1>Menu</h1></header>
            <div class="stat-pill" style="padding: 20px; margin-bottom: 10px; cursor:pointer;" onclick="window.open('https://saweria.co/ramateam', '_blank')"><i data-lucide="heart" style="color:#ff3b30"></i> Donasi Developer</div>
        </div>
    </div>

    <div class="dock-wrap" id="mainDock">
        <div class="dock">
            <div class="dock-item active" onclick="switchView('home', this)"><i data-lucide="home"></i><span>Beranda</span></div>
            <div class="dock-item" onclick="switchView('browse', this)"><i data-lucide="compass"></i><span>Jelajah</span></div>
            <div class="dock-item" onclick="switchView('fav', this)"><i data-lucide="heart"></i><span>Favorit</span></div>
            <div class="dock-item" onclick="switchView('settings', this)"><i data-lucide="menu"></i><span>Menu</span></div>
        </div>
    </div>

    <div id="detailPanel" class="panel">
        <div class="panel-nav"><button class="btn-round" onclick="closeDetail()"><i data-lucide="chevron-down"></i></button></div>
        <div class="gallery" id="detGallery"></div>
        <div class="container">
            <h2 id="detTitle" style="font-size: 24px; font-weight: 800; margin-top:10px;">Nama Tema</h2>
            <p id="detAuthor" style="color: var(--text-dim); font-size: 13px; margin-bottom:15px;">GoR 1.1 Creator</p>
            <div style="display: flex; gap: 8px; margin-bottom: 20px;">
                <div class="stat-pill"><i data-lucide="thumbs-up" style="width:12px; color:#ffcc00"></i> <span id="detLikeCount">0</span></div>
                <div class="stat-pill"><i data-lucide="box" style="width:12px; color:#34c759"></i> <span id="detSize">3.5 MB</span></div>
            </div>
            <p id="detDesc" style="color: var(--text-dim); line-height: 1.5; font-size: 14px;"></p>
        </div>
    </div>

    <div class="apply-bar" id="bottomApplyBar">
        <button class="btn-apply" id="installBtn"><i data-lucide="download-cloud"></i> UNDUH TEMA</button>
    </div>

    <script>
        let allData = [];
        let favorites = JSON.parse(localStorage.getItem('themeX_favs') || '[]');

        async function fetchThemes() {
            try {
                const response = await fetch('/api/get-themes');
                const data = await response.json();
                allData = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                refreshView();
            } catch (e) { console.error(e); }
        }

        function renderItems(items, gridId) {
            const grid = document.getElementById(gridId);
            if (!grid) return;
            grid.innerHTML = items.length ? '' : '<p style="opacity:0.3; text-align:center; padding:50px; grid-column:1/-1;">Belum ada tema.</p>';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => openDetail(item);
                div.innerHTML = `<div class="card-img"><img src="${item.images ? item.images[0] : ''}" loading="lazy"></div>
                                 <p style="font-size:14px; font-weight:700;">${item.name}</p>`;
                grid.appendChild(div);
            });
            lucide.createIcons();
        }

        function refreshView() {
            renderItems(allData.filter(i => !i.is_apk), 'mainGrid');
            renderItems([...allData].reverse().filter(i => !i.is_apk), 'browseGrid');
            renderItems(allData.filter(i => favorites.includes(i.id)), 'favGrid');
        }

        window.switchView = (v, el) => {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.dock-item').forEach(x => x.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            el.classList.add('active');
            refreshView();
        };

        window.openDetail = (item) => {
            document.getElementById('detTitle').innerText = item.name;
            document.getElementById('detDesc').innerText = item.desc || "Tema premium.";
            document.getElementById('detLikeCount').innerText = item.likes || 0;
            document.getElementById('detSize').innerText = item.size || '3.5 MB';
            const gal = document.getElementById('detGallery');
            gal.innerHTML = '';
            (item.images || []).forEach(img => { gal.innerHTML += `<div class="gallery-item"><img src="${img}"></div>`; });
            document.getElementById('installBtn').onclick = () => window.open(item.link, '_blank');
            document.getElementById('detailPanel').classList.add('active');
            document.getElementById('mainDock').style.transform = 'translateY(150%)';
        };

        window.closeDetail = () => {
            document.getElementById('detailPanel').classList.remove('active');
            document.getElementById('mainDock').style.transform = 'translateY(0)';
        };

        window.toggleTheme = () => {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
            lucide.createIcons();
        };

        window.onload = fetchThemes;
        lucide.createIcons();
    </script>
</body>
</html>
