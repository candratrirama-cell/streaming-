<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klyna AI</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 90%;
            max-width: 500px;
            height: 80vh;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--neon-green);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--neon-green);
            color: black;
            font-weight: bold;
        }

        .ai-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.2);
            border-left: 4px solid var(--neon-green);
        }

        .input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--neon-green);
            background: transparent;
            color: white;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: var(--neon-green);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        a {
            color: #00e5ff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Tanya Klyna..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');

    // Link target untuk deteksi otomatis
    const targetTikTok = "https://vt.tiktok.com/ZSHrgLgPM/";
    const tutorialResponse = 'tutorial lockscreen ada disini: <a href="https://whatsapp.com/channel/0029Vb76MVVHrDZenj4Tw92Y/108" target="_blank">Klik Disini</a>';

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Tampilkan pesan user
        appendMessage(text, 'user-msg');
        userInput.value = '';

        // Cek jika input berisi link TikTok yang dimaksud
        if (text.includes(targetTikTok)) {
            setTimeout(() => {
                appendMessage(tutorialResponse, 'ai-msg', true);
            }, 500);
            return;
        }

        // Loading state
        const loadingId = appendMessage("Klyna sedang berpikir...", 'ai-msg');

        try {
            const response = await fetch(`https://klyna-swart.vercel.app/api/chat?key=klyna-5x9k1koc&text=${encodeURIComponent(text)}`);
            const data = await response.json();
            
            // Hapus pesan loading dan ganti dengan jawaban API
            document.getElementById(loadingId).innerHTML = data.result || data.message || "Maaf, terjadi kesalahan.";
        } catch (error) {
            document.getElementById(loadingId).innerText = "Gagal terhubung ke API.";
        }
    }

    function appendMessage(text, className, isHTML = false) {
        const msgDiv = document.createElement('div');
        const id = 'msg-' + Date.now();
        msgDiv.id = id;
        msgDiv.className = `message ${className}`;
        
        if (isHTML) {
            msgDiv.innerHTML = text;
        } else {
            msgDiv.innerText = text;
        }

        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return id;
    }
</script>

</body>
</html>
