<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Rapay - Masuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00f2ff; font-family: 'monospace'; }
        .input-glow:focus { box-shadow: 0 0 10px #00f2ff; outline: none; }
        .card-cyber { border: 1px solid #00f2ff; background: #0a0a0a; }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-4">
    <div class="card-cyber p-8 rounded-lg w-full max-w-sm">
        <h1 class="text-3xl font-bold mb-8 text-center tracking-tighter">RAPAY LOGIN</h1>
        
        <div id="auth-form">
            <div id="reg-inputs" class="hidden">
                <input type="text" id="username" placeholder="Username" class="w-full p-2 mb-4 bg-black border border-gray-800 rounded input-glow">
                <input type="text" id="phone" placeholder="Nomor Telepon" class="w-full p-2 mb-4 bg-black border border-gray-800 rounded input-glow">
            </div>
            <input type="email" id="email" placeholder="Email" class="w-full p-2 mb-4 bg-black border border-gray-800 rounded input-glow">
            <input type="password" id="password" placeholder="Password" class="w-full p-2 mb-6 bg-black border border-gray-800 rounded input-glow">
            
            <button onclick="submitAuth()" id="btn-text" class="w-full bg-cyan-500 text-black py-2 rounded font-black hover:bg-white transition">LOG IN</button>
            
            <p class="mt-6 text-xs text-center text-gray-500">
                <span id="toggle-text">Belum punya akun?</span> 
                <span class="text-cyan-400 cursor-pointer underline" onclick="toggleMode()">Klik di sini</span>
            </p>
        </div>
    </div>

    <script>
        let mode = 'login';

        function toggleMode() {
            mode = mode === 'login' ? 'register' : 'login';
            document.getElementById('reg-inputs').classList.toggle('hidden');
            document.getElementById('btn-text').innerText = mode.toUpperCase();
            document.getElementById('toggle-text').innerText = mode === 'login' ? 'Belum punya akun?' : 'Sudah punya akun?';
        }

        async function submitAuth() {
            const data = {
                action: mode,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                username: document.getElementById('username')?.value,
                phone: document.getElementById('phone')?.value
            };

            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await res.json();
            if (result.status) {
                if (mode === 'login') {
                    localStorage.setItem('rapay_uid', result.uid);
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Berhasil Daftar! Silakan Login.");
                    toggleMode();
                }
            } else {
                alert(result.msg);
            }
        }
    </script>
</body>
</html>
