<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLOY | ADMIN NODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;900&display=swap');
        body { background-color: #1a1a2e; font-family: 'Public Sans', sans-serif; }
        .neo-box { background: #fff; border: 4px solid #000; box-shadow: 8px 8px 0px #000; }
        .neo-btn { background: #facc15; border: 4px solid #000; box-shadow: 4px 4px 0px #000; font-weight: 900; }
        .neo-input { width: 100%; padding: 15px; border: 4px solid #000; font-weight: 900; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <section id="login-page" class="min-h-screen flex items-center justify-center">
        <div class="neo-box p-10 max-w-sm w-full text-center">
            <h2 class="text-2xl font-black mb-8 italic underline">MASUKAN SANDI</h2>
            <input type="password" id="s-in" placeholder="******" class="neo-input mb-8 text-center">
            <button onclick="doLogin()" class="neo-btn w-full py-4 uppercase italic">Buka Panel →</button>
        </div>
    </section>

    <section id="admin-page" class="hidden max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black text-white italic">BOSS PANEL</h1>
            <button onclick="localStorage.clear(); location.reload();" class="neo-btn bg-red-500 text-white px-6 py-2">LOGOUT</button>
        </div>

        <div class="neo-box p-8 bg-white mb-10">
            <input type="text" id="slug" placeholder="slug-project" class="neo-input mb-4 lowercase">
            <textarea id="html" placeholder="HTML Code..." class="neo-input h-48 mb-6 font-mono text-sm"></textarea>
            <button onclick="doPublish()" class="neo-btn bg-cyan-400 w-full py-4 uppercase italic">LAUNCH ✨</button>
        </div>

        <div id="list" class="space-y-4"></div>
    </section>

<script>
    const getToken = () => localStorage.getItem('bki_token');

    window.onload = () => { if(getToken()) showDash(); };

    async function doLogin() {
        const s = document.getElementById('s-in').value;
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sandi: s })
        });
        const data = await res.json();
        if(res.ok) {
            localStorage.setItem('bki_token', data.token);
            showDash();
        } else { alert("SALAH!"); }
    }

    function showDash() {
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('admin-page').classList.remove('hidden');
        loadList();
    }

    async function doPublish() {
        const res = await fetch('/api/publish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': getToken() },
            body: JSON.stringify({ slug: document.getElementById('slug').value, content: document.getElementById('html').value })
        });
        if(res.ok) { alert("Sukses!"); location.reload(); }
    }

    async function loadList() {
        const res = await fetch('/api/list', { headers: { 'Authorization': getToken() } });
        const data = await res.json();
        const div = document.getElementById('list');
        div.innerHTML = "";
        for(let k in data) {
            div.innerHTML += `
                <div class="neo-box p-4 flex justify-between bg-white items-center">
                    <span class="font-black italic">/${k}</span>
                    <button onclick="del('${k}')" class="text-red-600 font-black">HAPUS</button>
                </div>`;
        }
    }

    async function del(k) {
        if(confirm("Hapus?")) {
            await fetch(`/api/delete/${k}`, { 
                method: 'DELETE', 
                headers: { 'Authorization': getToken() } 
            });
            loadList();
        }
    }
</script>
</body>
</html>
