<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>LockBase Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d1117] text-white">

    <div id="loginArea" class="flex h-screen items-center justify-center">
        <div class="bg-[#161b22] p-8 rounded-xl border border-gray-800 w-80">
            <input id="pass" type="password" class="w-full p-2 bg-gray-900 mb-4 rounded" placeholder="Password">
            <button onclick="handleLogin()" class="w-full bg-blue-600 p-2 rounded">Login</button>
        </div>
    </div>

    <div id="dashArea" class="hidden p-8">
        <h1 class="text-2xl font-bold mb-4">LockBase Projects</h1>
        <div id="list" class="grid grid-cols-3 gap-4"></div>
    </div>

    <script>
        async function handleLogin() {
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password })
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('dashArea').classList.remove('hidden');
                loadData();
            } else {
                alert("Gagal!");
            }
        }

        async function loadData() {
            const res = await fetch('/api/projects');
            const projects = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = "";
            for(let key in projects) {
                list.innerHTML += `<div class="bg-gray-800 p-4 rounded">${projects[key].name}</div>`;
            }
        }
    </script>
</body>
</html>
