<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Rapay - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; }
        .cyber-border { border: 1px solid #1a1a1a; transition: 0.3s; }
        .cyber-border:hover { border-color: #00f2ff; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-gray-900 pb-4">
            <div>
                <h1 class="text-xl font-black text-cyan-400">RAPAY DASHBOARD</h1>
                <p class="text-xs text-gray-500">Welcome, <span id="display-user">...</span></p>
            </div>
            <div class="flex gap-2">
                <button onclick="location.href='admin.html'" id="admin-btn" class="hidden bg-red-900 text-white text-[10px] px-2 py-1 rounded">ADMIN PANEL</button>
                <button onclick="logout()" class="text-xs text-gray-400 hover:text-white">Logout</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="cyber-border p-6 rounded-lg bg-gray-900/50">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Saldo Akun</p>
                <h2 class="text-3xl font-bold text-white">Rp <span id="display-balance">0</span></h2>
            </div>
            <div class="cyber-border p-6 rounded-lg bg-gray-900/50">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Rapay API Key (13 Digit)</p>
                <code class="text-yellow-500 font-mono text-sm" id="display-apikey">LOADING...</code>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="cyber-border p-6 rounded-lg">
                <h3 class="text-sm font-bold mb-4 border-l-2 border-cyan-500 pl-2">PENARIKAN DANA (ONLY DANA)</h3>
                <input type="number" id="wd-amount" placeholder="Nominal (Min 10000)" class="w-full p-2 mb-3 bg-black border border-gray-800 rounded text-sm">
                <input type="text" id="wd-phone" placeholder="Nomor DANA" class="w-full p-2 mb-4 bg-black border border-gray-800 rounded text-sm">
                <button onclick="tarikDana()" class="w-full bg-white text-black py-2 rounded text-sm font-bold hover:bg-cyan-500 transition">TARIK DANA</button>
                <p class="text-[10px] mt-2 text-gray-500">*Biaya admin Rp 1.000 otomatis dipotong dari saldo.</p>
            </div>

            <div class="cyber-border p-6 rounded-lg text-center">
                <h3 class="text-sm font-bold mb-4 text-left border-l-2 border-cyan-500 pl-2">SALIN API HOKTO (GENERATE)</h3>
                <button onclick="buatQRIS()" class="w-full border border-cyan-900 py-2 rounded text-sm hover:bg-cyan-900/20 transition mb-4">BUAT QRIS RP 10.000</button>
                <div id="qris-area" class="flex justify-center min-h-[150px] items-center border border-dashed border-gray-800 rounded">
                    <p class="text-gray-600 text-[10px]">QRIS akan muncul di sini</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uid = localStorage.getItem('rapay_uid');
        if (!uid) window.location.href = 'index.html';

        async function init() {
            const res = await fetch(`/api/get-user?uid=${uid}`);
            const user = await res.json();
            
            if (!user) return logout();
            
            document.getElementById('display-user').innerText = user.username;
            document.getElementById('display-balance').innerText = user.balance.toLocaleString();
            document.getElementById('display-apikey').innerText = user.apiKey;
            
            if (user.role === 'admin') {
                document.getElementById('admin-btn').classList.remove('hidden');
            }
        }

        async function buatQRIS() {
            document.getElementById('qris-area').innerHTML = "<p class='text-xs'>Genereting...</p>";
            const res = await fetch(`/api/generate?uid=${uid}&nominal=10000`);
            const data = await res.json();
            
            if (data.qr_string || data.qr_url) {
                document.getElementById('qris-area').innerHTML = `
                    <div class="p-2 bg-white rounded">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?data=${data.qr_string}&size=150x150" alt="QRIS">
                    </div>
                `;
                alert("QRIS Berhasil dibuat! Saldo akan bertambah otomatis jika dibayar.");
                // Refresh saldo setelah beberapa detik (Simulasi sukses)
                setTimeout(init, 5000);
            }
        }

        async function tarikDana() {
            const amount = document.getElementById('wd-amount').value;
            const phone = document.getElementById('wd-phone').value;

            const res = await fetch('/api/withdraw', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uid, amount, phone })
            });

            const result = await res.json();
            alert(result.msg);
            if (result.status) init();
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>
</html>
